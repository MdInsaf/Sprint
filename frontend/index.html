<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SprintFlow</title>
    <meta name="description" content="SprintFlow: tech sprint and work tracker" />
    <meta name="author" content="SprintFlow" />
    <script>
      (function () {
        try {
          var theme = localStorage.getItem('sprintflow-theme');
          if (theme === 'dark') {
            document.documentElement.classList.add('dark');
          }
          var favicon = document.querySelector("link[rel~='icon']");
          if (favicon) {
            favicon.setAttribute('href', theme === 'dark' ? '/owl.png' : '/favicon.png');
          }
        } catch (e) {
          // ignore
        }
      })();
    </script>

    <meta property="og:title" content="SprintFlow" />
    <meta property="og:description" content="SprintFlow: tech sprint and work tracker" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/placeholder.svg" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/placeholder.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" />
  </head>

  <body>
    <div id="root">
      <div class="app-loading" aria-live="polite" aria-busy="true">
        <div class="app-loading__orb" aria-hidden="true"></div>
        <div class="app-loading__text">Loading SprintFlow...</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
